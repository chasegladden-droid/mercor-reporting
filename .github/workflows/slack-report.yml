name: Daily Slack Report

on:
  schedule:
    # Every weekday (Mon–Fri) at 9am PT (16:00 UTC)
    - cron: "0 16 * * 1-5"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Check for duplicate run today
        id: dedup
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().slice(0, 10);
            const runs = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'slack-report.yml',
              status: 'success',
              per_page: 10,
            });
            const alreadySentToday = runs.data.workflow_runs.some(r => {
              return r.id !== context.runId && r.conclusion === 'success' &&
                     r.updated_at.slice(0, 10) === today;
            });
            if (alreadySentToday) {
              core.warning('A successful run already completed today — skipping to avoid duplicate Slack message.');
              core.setOutput('skip', 'true');
            } else {
              core.setOutput('skip', 'false');
            }

      - uses: actions/checkout@v4
        if: steps.dedup.outputs.skip != 'true'

      - uses: actions/setup-python@v5
        if: steps.dedup.outputs.skip != 'true'
        with:
          python-version: "3.11"

      - run: pip install requests python-dotenv
        if: steps.dedup.outputs.skip != 'true'

      - run: python marketing-reports/daily-social-report/slack_report.py
        if: steps.dedup.outputs.skip != 'true'
        env:
          SPROUT_API_TOKEN: ${{ secrets.SPROUT_API_TOKEN }}
          SPROUT_CUSTOMER_ID: ${{ secrets.SPROUT_CUSTOMER_ID }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
          CLAY_API_KEY: ${{ secrets.CLAY_API_KEY }}
          PROFOUND_API_KEY: ${{ secrets.PROFOUND_API_KEY }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_PARENT_PAGE_ID: 35a5392cc93e81a4bd4fca8d2fd0e8b0
