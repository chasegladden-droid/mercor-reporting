name: Monday Slack Report

on:
  schedule:
    # Every Monday at 9am PT (16:00 UTC)
    - cron: "0 16 * * 1"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install requests python-dotenv

      - run: python slack_report.py
        env:
          SPROUT_API_TOKEN: ${{ secrets.SPROUT_API_TOKEN }}
          SPROUT_CUSTOMER_ID: ${{ secrets.SPROUT_CUSTOMER_ID }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
          CLAY_API_KEY: ${{ secrets.CLAY_API_KEY }}
